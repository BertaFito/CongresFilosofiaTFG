<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria Filosòfica | Congrés TFG</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primari: #556b2f;
            --primari-clar: #6b8e23;
            --accent: #d4af37;
            --text: #1a1a1a;
            --text-clar: #64748b;
            --fons: #f8fafc;
            --blanc: #ffffff;
            --transicio: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--fons);
            color: var(--text);
            line-height: 1.7;
        }

        header {
            background: var(--primari);
            padding: 3rem 2rem;
            text-align: center;
            color: var(--blanc);
            clip-path: polygon(0 0, 100% 0, 100% 90%, 0 100%);
        }

        header h1 { font-family: 'Playfair Display', serif; font-size: 3rem; }

        .navegacio {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        .boto-tornar {
            text-decoration: none;
            color: var(--primari);
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: var(--transicio);
        }

        .boto-tornar:hover { transform: translateX(-5px); }

        .cartell-proximament {
            max-width: 1400px;
            margin: 4rem auto;
            padding: 0 2rem;
        }

        .cartell-contingut {
            position: relative;
            padding: 6rem 2rem;
            border-radius: 30px;
            text-align: center;
            color: white;
            overflow: hidden;
            border: 1px solid var(--accent);
            /* Propietats de la imatge de fons */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* Capa fosca per millorar la llegibilitat del text sobre la foto */
        .overlay-fosca {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(26, 26, 26, 0.4), rgba(26, 26, 26, 0.8));
            z-index: 1;
        }

        /* Manté el text per sobre de la capa fosca */
        .contingut-text {
            position: relative;
            z-index: 2;
        }

        .cartell-contingut .etiqueta {
            background: var(--accent);
            color: var(--primari);
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: inline-block;
            margin-bottom: 1.5rem;
        }

        .cartell-contingut h2 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            margin-bottom: 1rem;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .cartell-contingut p {
            max-width: 600px;
            margin: 0 auto;
            font-size: 1.1rem;
            font-weight: 300;
            text-shadow: 0 1px 5px rgba(0,0,0,0.5);
        }

        .linia-decorativa {
            width: 60px;
            height: 3px;
            background: var(--accent);
            margin: 2.5rem auto 0;
        }

        @media (max-width: 600px) {
            .cartell-contingut { padding: 4rem 1.5rem; }
            .cartell-contingut h2 { font-size: 2rem; }
        }
        
        .mosaic-galeria {
            max-width: 1400px;
            margin: 2rem auto 6rem;
            padding: 0 2rem;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2rem;
        }

        .peça-galeria {
            position: relative;
            aspect-ratio: 16/10;
            background: #e2e8f0;
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            transition: var(--transicio);
        }

        .imatge-portada {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: var(--transicio);
        }

        .capa-info {
            position: absolute;
            inset: 0;
            background: rgba(85, 107, 47, 0.9);
            color: white;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            opacity: 0;
            transition: var(--transicio);
            text-align: center;
        }

        .peça-galeria:hover .capa-info { opacity: 1; }
        .peça-galeria:hover .imatge-portada { transform: scale(1.1); }

        .capa-info h3 { font-family: 'Playfair Display', serif; font-size: 1.4rem; margin-bottom: 0.5rem; }
        .capa-info .autor { font-weight: 600; color: var(--accent); margin-bottom: 1rem; font-size: 0.9rem; text-transform: uppercase; }
        .capa-info .resum { font-size: 0.85rem; line-height: 1.4; opacity: 0.9; }

        .modal {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            padding: 2rem;
        }

        .contingut-modal {
            background: var(--blanc);
            width: 100%;
            max-width: 1000px;
            max-height: 90vh;
            border-radius: 30px;
            position: relative;
            padding: 3rem;
            overflow-y: auto;
            animation: aparicio 0.5s ease;
        }

        .embed-container {
            width: 100%;
            height: 500px;
            margin-top: 2rem;
            border-radius: 15px;
            overflow: hidden;
            background: #000;
        }

        iframe, video {
            width: 100%;
            height: 100%;
            border: none;
        }

        @keyframes aparicio {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .tancar-modal {
            position: absolute;
            top: 20px;
            right: 25px;
            font-size: 2.5rem;
            cursor: pointer;
            color: var(--text-clar);
            transition: var(--transicio);
            z-index: 10;
        }

        footer { text-align: center; padding: 4rem; color: var(--text-clar); border-top: 1px solid #e2e8f0; }

        @media (max-width: 600px) {
            header h1 { font-size: 2rem; }
            .contingut-modal { padding: 1.5rem; }
            .embed-container { height: 300px; }
        }
    </style>
</head>
<body>

<header>
    <h1>Galeria Filosòfica</h1>
    <p>Treballs audiovisuals, entrevistes i assajos</p>
</header>

<nav class="navegacio">
    <a href="pagina_congres-mobil.html" class="boto-tornar">← Tornar a l'inici</a>
</nav>

<section class="cartell-proximament">
    <div class="cartell-contingut" style="background-image: url('Pàgines/Oliva.jpg');">
        <div class="overlay-fosca"></div>
        <div class="contingut-text">
            <span class="etiqueta">Pròximament</span>
            <h2>Contingut Addicional</h2>
            <p>Anirem publicant contingut addicional preparat per l'alumnat!</p>
            <p><i>Us convidem a tornar-hi d'aquí poc.</i></p>
            <div class="linia-decorativa"></div>
        </div>
    </div>
</section>

<footer>
    <p>© 2025-2026 Universitat de Barcelona</p>
</footer>

<div id="finestra-flotant" class="modal" onclick="tancarModal(event)">
    <div class="contingut-modal" onclick="event.stopPropagation()">
        <span class="tancar-modal" onclick="tancarModalDirecte()">&times;</span>
        <div id="contingut-detallat"></div>
    </div>
</div>

<script>
    function obrirObra(titol, autor, resum, fitxerUrl, tipus) {
        const contenidor = document.getElementById('contingut-detallat');
        
        let visualitzador = '';
        
        if (tipus === 'pdf') {
            visualitzador = `<div class="embed-container"><iframe src="${fitxerUrl}#toolbar=0"></iframe></div>`;
        } else if (tipus === 'video') {
            visualitzador = `
                <div class="embed-container">
                    <video controls>
                        <source src="${fitxerUrl}" type="video/mp4">
                        El teu navegador no suporta vídeos.
                    </video>
                </div>`;
        }

        contenidor.innerHTML = `
            <h2 style="font-family: 'Playfair Display', serif; font-size: 2.5rem; color: var(--primari); margin-bottom: 0.5rem;">${titol}</h2>
            <p style="text-transform: uppercase; letter-spacing: 1px; color: var(--accent); font-weight: 600; margin-bottom: 1rem;">${autor}</p>
            <p style="font-size: 1.1rem; color: var(--text); margin-bottom: 1.5rem;">${resum}</p>
            ${visualitzador}
        `;
        
        document.getElementById('finestra-flotant').style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }

    function tancarModalDirecte() {
        // Es para el vídeo si s'està reproduint quan es tanca
        const contenidor = document.getElementById('contingut-detallat');
        contenidor.innerHTML = ''; 
        
        document.getElementById('finestra-flotant').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    function tancarModal(e) {
        if(e.target.id === 'finestra-flotant') {
            tancarModalDirecte();
        }
    }
</script>

</body>
</html>
